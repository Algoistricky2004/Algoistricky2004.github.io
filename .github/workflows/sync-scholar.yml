name: Sync Google Scholar Publications

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install scholarly requests

      - name: Sync publications
        run: python scripts/sync_scholar.py
        env:
          SCHOLAR_USER_ID: TtyaWYAAAAAJ

      - name: Commit updated publications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git diff --staged --quiet || git commit -m "chore: sync publications from Google Scholar [skip ci]"
          git push
